<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SalesScout</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F1923;--s1:#162230;--s2:#1A2836;--s3:#1E2E3E;--hov:#1C2A38;--bd:rgba(255,255,255,0.08);--bdl:rgba(255,255,255,0.12);--tx:#F1F5F9;--tx2:#B0BEC5;--tx2b:#90A4AE;--txd:#607D8B;--bl:#4A90D9;--bld:rgba(74,144,217,.08);--blg:rgba(74,144,217,.18);--gn:#34D399;--gng:rgba(52,211,153,.16);--gnd:rgba(52,211,153,.07);--yl:#FBBF24;--ylg:rgba(251,191,36,.16);--rd:#F87171;--rdg:rgba(248,113,113,.16);--m:'JetBrains Mono',monospace;--f:'Inter',sans-serif;--fh:'Archivo',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:var(--f);-webkit-font-smoothing:antialiased}

.shell{display:flex;height:100vh;overflow:hidden}

/* LEFT PANEL */
.left{width:380px;min-width:320px;display:flex;flex-direction:column;height:100vh;border-right:1px solid var(--bd);background:var(--bg);position:relative;z-index:2;flex-shrink:0}

/* RIGHT PANEL */
.right{flex:1;display:flex;flex-direction:column;height:100vh;background:var(--bg);overflow:hidden;min-width:0}
.r-empty{flex:1;display:flex;align-items:center;justify-content:center;padding:40px;text-align:center;background:radial-gradient(circle at 50% 40%,rgba(74,144,217,.03) 0%,transparent 70%)}
.r-empty-inner{max-width:280px}
.r-empty-icon{font-size:32px;margin-bottom:12px}
.r-empty-title{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:6px}
.r-empty-sub{font-size:12px;color:var(--txd);line-height:1.5}
.r-empty-sub .g{color:var(--gn);font-weight:600}

/* Action bar — STICKY at top of right panel */
.r-action{position:sticky;top:0;z-index:5;background:var(--bg);border-bottom:1px solid var(--bd);padding:12px 24px;flex-shrink:0}
.r-action-btns{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.ab{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;font-family:var(--f);text-decoration:none;cursor:pointer;border:none;transition:all .12s;display:inline-flex;align-items:center;gap:4px}
.ab.em{background:var(--bl);color:#fff}.ab.em:hover{background:#3A7BC8}
.ab.ph{background:var(--gnd);color:var(--gn);border:1px solid rgba(52,211,153,.2)}.ab.ph:hover{background:rgba(52,211,153,.12)}
.ab.li{background:transparent;border:1px solid var(--bdl);color:var(--tx2)}.ab.li:hover{border-color:var(--bl);color:var(--bl)}
.ab.cp{background:transparent;border:1px solid var(--bdl);color:var(--tx2)}.ab.cp:hover{border-color:var(--bl);color:var(--bl)}
.ab.search{background:var(--s2);border:1px solid var(--bdl);color:var(--yl)}.ab.search:hover{border-color:var(--yl)}
.r-action-who{font-size:11px;color:var(--tx2);margin-top:6px;line-height:1.4}
.r-action-who strong{color:var(--tx);font-weight:600}

.r-scroll{flex:1;overflow-y:auto;padding:0 24px 30px}
.r-scroll::-webkit-scrollbar{width:3px}
.r-scroll::-webkit-scrollbar-thumb{background:var(--bdl);border-radius:3px}

/* MOBILE */
@media(max-width:767px){
  .shell{flex-direction:column}
  .left{width:100%;max-width:100%;min-width:0;border-right:none}
  .right{display:none!important}
  .mob-ov-el{display:block!important}
}
@media(min-width:768px){
  .mob-ov-el{display:none!important}
}
@media(min-width:768px) and (max-width:1024px){
  .left{width:340px;min-width:300px}
}

/* === TOPBAR === */
.top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px;background:linear-gradient(180deg,rgba(74,144,217,.04) 0%,var(--bg) 100%);flex-shrink:0}
.logo{font-size:16px;font-weight:700;letter-spacing:-.03em}.logo span{color:var(--bl)}
.tright{display:flex;align-items:center;gap:10px}
.tname{font-size:11px;color:var(--tx2);font-weight:500}
.av{width:28px;height:28px;border-radius:50%;background:var(--bld);border:1.5px solid var(--bl);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--bl);cursor:pointer;position:relative}
.av-menu{position:absolute;top:36px;right:0;background:var(--s2);border:1px solid var(--bdl);border-radius:10px;padding:6px;min-width:170px;display:none;z-index:60;box-shadow:0 8px 30px rgba(0,0,0,.6)}
.av-menu.open{display:block}
.av-i{padding:8px 12px;border-radius:6px;font-size:12px;color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .12s}
.av-i:hover{background:var(--hov);color:var(--tx)}

/* View toggle */
.vtog{display:flex;gap:0;padding:4px 16px 6px;flex-shrink:0}
.vtab{flex:1;padding:6px 0;text-align:center;font-size:11px;font-weight:600;border:1px solid var(--bdl);color:var(--txd);background:transparent;cursor:pointer;font-family:var(--f);transition:all .15s}
.vtab:first-child{border-radius:7px 0 0 7px;border-right:none}
.vtab:last-child{border-radius:0 7px 7px 0}
.vtab.on{background:var(--bld);border-color:var(--bl);color:var(--bl)}

/* Status + Progress */
.status{padding:2px 16px 2px;font-size:12px;color:var(--tx2);line-height:1.4;flex-shrink:0}
.status strong{color:var(--tx);font-weight:600}
.status .g{color:var(--gn);font-weight:600}
.status .w{color:var(--yl);font-weight:600}

.prog-wrap{display:flex;align-items:center;gap:8px;padding:4px 16px 2px;flex-shrink:0}
.prog-bar{flex:1;height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--gn);border-radius:3px;transition:width .6s ease-out}
.prog-label{font-size:10px;font-family:var(--m);color:var(--gn);font-weight:600;flex-shrink:0}

.rep-stats{padding:2px 16px 4px;font-size:10px;color:var(--txd);flex-shrink:0}
.rep-stats span{color:var(--tx2);font-weight:500}

/* Filters */
.filters{display:flex;gap:4px;padding:2px 16px 6px;overflow-x:auto;flex-shrink:0;-ms-overflow-style:none;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fc{padding:4px 9px;border-radius:14px;font-size:10px;font-weight:600;border:1px solid var(--bdl);color:var(--txd);background:transparent;cursor:pointer;font-family:var(--f);white-space:nowrap;transition:all .15s}
.fc.on{background:var(--bld);border-color:var(--bl);color:var(--bl)}

/* LIST */
.list{flex:1;overflow-y:auto;padding:0 8px 90px;display:flex;flex-direction:column;gap:2px;min-height:0}
.list::-webkit-scrollbar{width:2px}
.list::-webkit-scrollbar-thumb{background:var(--bdl);border-radius:2px}

.sec-hdr{padding:6px 8px 2px;font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--txd);display:flex;align-items:center;gap:6px}
.sec-hdr .pulse{width:5px;height:5px;border-radius:50%;background:var(--gn);animation:pulse 2s ease-in-out infinite}
.sec-hdr .refresh{font-weight:400;letter-spacing:0;text-transform:none;color:var(--txd);font-family:var(--m);margin-left:auto;font-size:8px}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

.row{display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--s1);border:1px solid var(--bd);border-radius:8px;cursor:pointer;transition:all .12s;animation:ri .3s ease-out both}
.row:hover{background:var(--hov);border-color:var(--bdl)}
.row.sel{border-color:var(--bl);background:rgba(74,144,217,.04)}
.row.hidden{display:none}
.row.top1{border-left:3px solid var(--gn);background:linear-gradient(90deg,rgba(52,211,153,.06),transparent 40%);box-shadow:0 0 12px rgba(52,211,153,.06)}
.row.unseen{position:relative}
.row.unseen::after{content:"";position:absolute;top:3px;right:3px;width:6px;height:6px;border-radius:50%;background:var(--bl);box-shadow:0 0 4px rgba(74,144,217,.5)}
@keyframes ri{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Score ring list */
.sr{position:relative;width:32px;height:32px;flex-shrink:0}
.sr svg{width:32px;height:32px;transform:rotate(-90deg)}
.sr .trk{fill:none;stroke:var(--bd);stroke-width:4}
.sr .fl{fill:none;stroke-width:4;stroke-linecap:round;stroke-dasharray:79;stroke-dashoffset:79;transition:stroke-dashoffset .9s ease-out .1s}
.sr.gn .fl{stroke:var(--gn)}.sr.yl .fl{stroke:var(--yl)}.sr.rd .fl{stroke:var(--rd)}
.sr .sv{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--m);font-weight:700;font-size:10px}
.sr.gn .sv{color:var(--gn)}.sr.yl .sv{color:var(--yl)}.sr.rd .sv{color:var(--rd)}

.ri-i{flex:1;min-width:0}
.ri-n{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-h{font-size:10px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

.ri-r{display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0}
/* Combined badge with action state */
.cbadge{padding:2px 5px;border-radius:3px;font-size:7px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;line-height:1.3;text-align:right}
.cbadge.pn{background:var(--gng);color:var(--gn)}.cbadge.pv{background:var(--ylg);color:var(--yl)}.cbadge.mo{background:var(--blg);color:var(--bl)}
.cbadge .act-line{display:block;font-size:7px;opacity:.7}
.ri-ts{font-size:8px;color:var(--txd);font-family:var(--m)}

/* ARD BAR */
.cmd{position:absolute;bottom:0;left:0;right:0;z-index:20;background:var(--bg);padding:0 12px}
.cmd-chips{display:none;gap:5px;padding:5px 0;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.cmd-chips::-webkit-scrollbar{display:none}
.cmd-chips.show{display:flex}
.cc{padding:5px 9px;border-radius:14px;font-size:10px;font-weight:500;border:1px solid var(--bdl);color:var(--tx2);background:var(--s2);cursor:pointer;font-family:var(--f);white-space:nowrap;flex-shrink:0;transition:all .12s}
.cc:hover{border-color:var(--bl);color:var(--bl)}
.cmd-row{display:flex;gap:6px;align-items:center;padding:6px 0;padding-bottom:max(8px,env(safe-area-inset-bottom))}
.cmd-in{flex:1;padding:9px 12px;background:var(--s2);border:1px solid var(--bdl);border-radius:10px;color:var(--tx);font-family:var(--f);font-size:12px;outline:none;transition:border-color .15s}
.cmd-in::placeholder{color:var(--txd)}.cmd-in:focus{border-color:var(--bl)}
.cmd-go{width:34px;height:34px;border-radius:8px;background:var(--bl);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cmd-go svg{width:13px;height:13px}

/* MOBILE OVERLAY */
.mob-ov-el{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:40;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);padding-bottom:20px}
.mob-ov-el.open{transform:translateY(0)}
.mob-back{position:sticky;top:0;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--bd);cursor:pointer;font-size:13px;font-weight:600;color:var(--bl);z-index:5}
.mob-c{padding:0 16px}

/* ====== BRIEF STYLES ====== */
.b-wrap{max-width:640px}

/* Brief header */
.bh{padding:14px 0 10px;display:flex;gap:12px;align-items:flex-start}
.b-sr{position:relative;width:48px;height:48px;flex-shrink:0;cursor:pointer}
.b-sr svg{width:48px;height:48px;transform:rotate(-90deg)}
.b-sr .trk{fill:none;stroke:var(--bd);stroke-width:4.5}
.b-sr .fl{fill:none;stroke-width:4.5;stroke-linecap:round;stroke-dasharray:120;stroke-dashoffset:120;transition:stroke-dashoffset 1s ease-out .15s}
.b-sr.gn .fl{stroke:var(--gn)}.b-sr.yl .fl{stroke:var(--yl)}.b-sr.rd .fl{stroke:var(--rd)}
.b-sr .sv{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--m);font-weight:700;font-size:14px}
.b-sr.gn .sv{color:var(--gn)}.b-sr.yl .sv{color:var(--yl)}.b-sr.rd .sv{color:var(--rd)}

.b-i{flex:1;min-width:0}
.b-co{font-size:16px;font-weight:800;letter-spacing:-.02em}
.b-ts{font-size:9px;color:var(--txd);font-family:var(--m);margin-top:2px}
.b-meta{display:flex;gap:6px;align-items:center;margin-top:4px;flex-wrap:wrap}
.b-money{margin-top:5px;font-family:var(--m);font-size:13px;font-weight:600;color:var(--gn)}
.b-mb{font-size:9px;color:var(--txd);font-family:var(--f)}
.b-sn{margin-top:5px;font-size:11px;color:var(--tx2);line-height:1.45}

/* Score detail */
.sd{display:none;padding:8px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;font-size:10px;margin-bottom:6px}
.sd.open{display:block}
.sdr{display:flex;justify-content:space-between;padding:2px 0}.sdl{color:var(--tx2)}.sdv{font-family:var(--m);font-weight:600}
.sdv.gn{color:var(--gn)}.sdv.yl{color:var(--yl)}.sdv.rd{color:var(--rd)}
.sdd{border-top:1px solid var(--bd);margin:3px 0}
.sdh{font-size:8px;color:var(--txd);text-align:center;cursor:pointer;padding:3px 0}

/* Email card */
.bec{background:var(--s2);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.bes{padding:8px 12px;background:var(--s3);border-bottom:1px solid var(--bd);font-size:11px;font-weight:600}.bes span{color:var(--txd);font-weight:400}
.beb{padding:10px 12px;font-size:11px;line-height:1.5;color:var(--tx2);white-space:pre-wrap}

/* Sections */
.bs{border-top:1px solid var(--bd);padding:10px 0}
.bst{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txd);margin-bottom:5px;cursor:pointer;display:flex;align-items:center;gap:5px}.bst:hover{color:var(--tx2)}
.bsb{font-size:11px;line-height:1.5;color:var(--tx2)}

/* Triggers */
.bt{padding:4px 0}.bt+.bt{border-top:1px solid var(--bd);padding-top:5px}
.btn-t{font-size:11px;font-weight:600;color:var(--tx)}
.btt{display:inline-block;padding:1px 4px;border-radius:3px;font-size:8px;font-weight:700;font-family:var(--m);margin-left:3px}
.btt.t1{background:var(--gng);color:var(--gn)}.btt.t2{background:var(--ylg);color:var(--yl)}
.btd{font-size:8px;color:var(--txd);font-family:var(--m);margin-left:3px}
.bte{font-size:10px;color:var(--txd);margin-top:2px;line-height:1.4}

/* Watch outs */
.bw{padding:4px 0;font-size:10px;color:var(--tx2);display:flex;gap:6px;line-height:1.4}
.bw+.bw{border-top:1px solid var(--bd);padding-top:4px}
.bwn{color:var(--yl);font-family:var(--m);font-weight:600;font-size:10px;width:14px;flex-shrink:0}

/* Next step */
.bns{margin-top:4px;padding:12px;background:var(--s2);border:1px solid var(--bd);border-radius:10px}
.bnsl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--bl)}
.bnst{margin-top:2px;font-size:12px;font-weight:600;line-height:1.3}

/* Email edit mode */
.b-email-edit{width:100%;min-height:120px;padding:10px 12px;background:var(--s1);border:1px solid var(--bl);border-radius:8px;color:var(--tx);font-family:var(--f);font-size:11px;line-height:1.5;resize:vertical;outline:none;margin-top:6px}
.b-send-row{display:flex;gap:6px;margin-top:6px;align-items:center}
.b-send-btn{padding:7px 16px;border-radius:8px;background:var(--gn);color:#050505;font-size:11px;font-weight:700;font-family:var(--f);border:none;cursor:pointer;transition:all .12s}
.b-send-btn:hover{background:#2BC48A}
.b-send-cancel{padding:7px 12px;border-radius:8px;background:transparent;border:1px solid var(--bdl);color:var(--tx2);font-size:11px;font-weight:600;font-family:var(--f);cursor:pointer}
.b-sent-confirm{padding:10px;background:var(--gnd);border:1px solid rgba(52,211,153,.2);border-radius:8px;text-align:center;color:var(--gn);font-size:12px;font-weight:600;margin-top:6px;animation:fadeIn .3s ease-out}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.bals{font-size:10px;color:var(--txd);margin-top:4px}

/* MANAGER */
.mgr-scroll{flex:1;overflow-y:auto;padding:12px 16px 90px}
.mgr-scroll::-webkit-scrollbar{width:2px}
.mgr-scroll::-webkit-scrollbar-thumb{background:var(--bdl);border-radius:2px}

.mgr-funnel{padding:14px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;margin-bottom:12px}
.mgr-ft{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txd);margin-bottom:10px}
.mgr-fr{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:12px}
.mgr-fr+.mgr-fr{border-top:1px solid var(--bd);padding-top:6px}
.mgr-fl{flex:1;color:var(--tx2)}.mgr-fv{font-family:var(--m);font-weight:600;color:var(--tx)}
.mgr-fd{font-size:10px;color:var(--gn);font-weight:500;margin-left:4px}
.mgr-fa{color:var(--txd);font-size:10px;text-align:center;padding:2px 0}

.mgr-sec{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--txd);margin:12px 0 6px}
.mgr-rep{display:flex;align-items:center;gap:10px;padding:10px;background:var(--s1);border:1px solid var(--bd);border-radius:8px;margin-bottom:4px;cursor:pointer;transition:all .12s}
.mgr-rep:hover{background:var(--hov);border-color:var(--bdl)}
.mgr-av{width:30px;height:30px;border-radius:50%;background:var(--bld);border:1.5px solid var(--bl);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--bl);flex-shrink:0}
.mgr-ri{flex:1}.mgr-rn{font-size:12px;font-weight:600}.mgr-rs{font-size:10px;color:var(--txd);margin-top:1px}
.mgr-bar{height:4px;background:var(--bd);border-radius:2px;margin-top:4px;overflow:hidden}
.mgr-fill{height:100%;border-radius:2px;transition:width .8s ease-out}




/* DEFEND section */
.sec-hdr.defend{color:var(--yl)}
.sec-hdr .shield{font-size:11px;margin-right:2px}
.row.defend-row{border-left:3px solid var(--yl);background:linear-gradient(90deg,rgba(251,191,36,.04),transparent 30%)}
.row.defend-row.at-risk{border-left-color:var(--rd);background:linear-gradient(90deg,rgba(248,113,113,.04),transparent 30%)}

/* Account health badge */
.health-badge{padding:2px 6px;border-radius:3px;font-size:7px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.health-badge.green{background:var(--gng);color:var(--gn)}
.health-badge.yellow{background:var(--ylg);color:var(--yl)}
.health-badge.red{background:var(--rdg);color:var(--rd)}

/* Defend brief extras */
.b-relationship{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;gap:16px;flex-wrap:wrap}
.b-rel-item{font-size:11px}
.b-rel-label{color:var(--txd);font-size:9px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.b-rel-val{color:var(--tx);font-weight:600;margin-top:2px}
.b-rel-val.green{color:var(--gn)}.b-rel-val.yellow{color:var(--yl)}.b-rel-val.red{color:var(--rd)}





/* Competitive window indicator */
.cw{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:9px;font-weight:600;font-family:var(--m)}
.cw.urgent{background:var(--rdg);color:var(--rd)}
.cw.closing{background:var(--ylg);color:var(--yl)}
.cw.open{background:var(--gng);color:var(--gn)}
.cw-icon{font-size:10px}

/* TMS connection indicator */
.tms-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:3px;font-size:8px;font-weight:600;background:rgba(52,211,153,.06);color:var(--gn);border:1px solid rgba(52,211,153,.12)}
.tms-badge .tms-dot{width:4px;height:4px;border-radius:50%;background:var(--gn);animation:pulse 2s ease-in-out infinite}

/* Defend score ring — urgency not prospect quality */
.sr.defend-gn .fl{stroke:var(--gn)}.sr.defend-gn .sv{color:var(--gn)}

  if(!useContact.ce&&!p.ph&&!p.ph2) h+='<button class="ab search" onclick="searchContact('+P.indexOf(p)+')">Searching for contact...</button>';
  h+='</div>';
  h+='<div class="r-action-who"><strong>'+p.cn+'</strong> · '+p.ct+(p.al?' · Also: '+p.al:'')+'</div>';
  return h;
}

function briefHtml(p){
  var col=sc(p.s),circ=2*Math.PI*19,off=circ-(p.s/100)*circ;
  var sd=p.sd;

  var h='<div class="b-wrap">';

  // Header
  h+='<div class="bh"><div class="b-sr '+col+'" onclick="document.getElementById(\'sd\').classList.toggle(\'open\')"><svg viewBox="0 0 48 48"><circle class="trk" cx="24" cy="24" r="19"/><circle class="fl" cx="24" cy="24" r="19" id="bsf" data-off="'+off+'"/></svg><div class="sv">'+p.s+'</div></div>';
  h+='<div class="b-i"><div class="b-co">'+p.c.toUpperCase()+'</div><div class="b-ts">Briefed: '+p.ts+'</div>';
  if(p.zone==="defend"&&p.health){h+='<div class="b-meta"><span class="health-badge '+p.health+'">'+p.healthLabel+'</span><span class="cbadge '+(p.ds==="URGENT"?"pv":"mo")+'">'+(p.ds==="URGENT"?"\uD83D\uDEE1 URGENT DEFEND":"\uD83D\uDEE1 DEFEND \u00B7 OPPORTUNITY")+'</span></div>'}
  else{h+='<div class="b-meta"><span class="cbadge '+vc(p.a)+'"><span class="act-line">'+actTxt(p)+'</span>'+verdTxt(p.a)+'</span></div>';}
  if(p.zone==="defend"&&p.managed){h+='<div class="b-money">'+p.managed+'<span style="font-size:10px;color:var(--tx2)"> at risk</span></div><div class="b-mb">'+(p.tenure?p.tenure+' relationship · ':'')+'auto-synced from TMS</div>'}
  else{h+='<div class="b-money">'+p.m+'<span style="font-size:10px;color:var(--tx2)">/yr</span></div><div class="b-mb">'+p.mb+'</div>';}
  h+='<div class="b-sn">'+p.sn+'</div>';
  if(p.window){
    var bwclass=p.window.indexOf("12")>=0?"urgent":p.window.indexOf("48")>=0?"closing":"open";
    h+='<div style="margin-top:6px"><span class="cw '+bwclass+'"><span class="cw-icon">\u23F1</span> Competitive window: '+p.window+' before other brokers reach out</span></div>';
  }
  h+='</div></div>';

  // Score detail — different breakdown for defend vs prospect
  var isDefendBrief = p.zone==="defend";
  var bt1=Math.min(sd.t1*5,20),bct=sd.ct?5:0,brc=sd.rc?10:0;
  h+='<div class="sd'+(firstBrief?' open':'')+'" id="sd">';
  h+='<div class="sdr"><span class="sdl">Fit: '+sd.f.r+'</span><span class="sdv '+sc(sd.f.p>=15?70:sd.f.p>=10?50:20)+'">+'+sd.f.p+'</span></div>';
  h+='<div class="sdr"><span class="sdl">Timing: '+sd.t.r+'</span><span class="sdv '+sc(sd.t.p>=15?70:sd.t.p>=10?50:20)+'">+'+sd.t.p+'</span></div>';
  h+='<div class="sdr"><span class="sdl">Pain: '+sd.pa.r+'</span><span class="sdv '+sc(sd.pa.p>=15?70:sd.pa.p>=10?50:20)+'">+'+sd.pa.p+'</span></div>';
  h+='<div class="sdr"><span class="sdl">Risk: '+sd.ri.r+'</span><span class="sdv '+sc(sd.ri.p>=15?70:sd.ri.p>=10?50:20)+'">+'+sd.ri.p+'</span></div>';
  h+='<div class="sdd"></div>';
  if(bt1>0)h+='<div class="sdr"><span class="sdl">Tier 1 (×'+sd.t1+')</span><span class="sdv gn">+'+bt1+'</span></div>';
  if(bct)h+='<div class="sdr"><span class="sdl">Verified email</span><span class="sdv gn">+5</span></div>';
  if(brc)h+='<div class="sdr"><span class="sdl">Active recall</span><span class="sdv gn">+10</span></div>';
  h+='<div class="sdd"></div><div class="sdr"><span class="sdl" style="font-weight:600;color:var(--tx)">Total</span><span class="sdv" style="color:var(--tx)">'+p.s+'/100</span></div></div>';
  h+='<div class="sdh" onclick="document.getElementById(\'sd\').classList.toggle(\'open\')">'+(isDefendBrief?'Tap to see defend urgency breakdown':'Tap score to see breakdown')+'</div>';

  // Ops alerts for defend accounts
  if(p.zone==="defend"&&p.ops_alerts&&p.ops_alerts.length>0){
    h+='<div class="bs"><div class="bst" style="color:var(--yl)">\u26A0 OPS ALERTS \u00B7 '+p.ops_alerts.length+'</div><div class="bsb">';
    p.ops_alerts.forEach(function(a){
      h+='<div class="ops-alert'+(a.sev==="red"?" red":"")+'"><div class="ops-alert-header"><div style="display:flex;align-items:center;gap:6px"><span class="ops-alert-sev '+a.sev+'"></span><span class="ops-alert-who">'+a.who+'</span></div><span class="ops-alert-when">'+a.when+'</span></div><div class="ops-alert-desc">'+a.desc+'</div></div>';
    });
    h+='</div></div>';
  }

  // Relationship section for defend accounts
  if(p.zone==="defend"){
    h+='<div class="bs"><div class="bst">\u25BC YOUR RELATIONSHIP</div><div class="bsb"><div class="b-relationship">';
    h+='<div class="b-rel-item"><div class="b-rel-label">Avg Monthly Revenue</div><div class="b-rel-val">'+(p.managed||"Connect TMS")+'</div></div>';
    h+='<div class="b-rel-item"><div class="b-rel-label">Relationship</div><div class="b-rel-val">'+(p.tenure||"Connect TMS")+'</div></div>';
    h+='<div class="b-rel-item"><div class="b-rel-label">On-Time Rate</div><div class="b-rel-val '+(p.health||"")+'">'+((p.healthLabel||"").split("\u00B7")[0].trim()||"Connect TMS")+'</div></div>';
    h+='<div class="b-rel-item"><div class="b-rel-label">Service Failures (90d)</div><div class="b-rel-val '+(p.health==="green"?"green":"yellow")+'">'+(p.health==="green"?"0":"2")+'</div></div>';
    h+='</div><div style="font-size:9px;color:var(--txd);margin-top:6px;display:flex;align-items:center;gap:4px">\u2713 Data from TMS · Auto-synced nightly</div></div></div>';
  }

  // Email preview with edit/send capability
  h+='<div class="bs"><div class="bst">▼ EMAIL PREVIEW</div><div class="bsb">';
  h+='<div class="bec" id="emailCard"><div class="bes"><span>Subj: </span>'+p.es+'</div><div class="beb" id="emailBody">'+p.eb+'</div></div>';
  h+='<div id="emailActions" style="display:flex;gap:6px;margin-top:6px">';
  h+='<button class="ab cp" onclick="editEmail('+P.indexOf(p)+')">✏️ Edit & Send</button>';
  h+='<button class="ab cp" onclick="cpE('+P.indexOf(p)+')">📋 Copy</button>';
  h+='</div>';
  h+='<div id="emailEdit" style="display:none"></div>';
  h+='</div></div>';

  // Triggers
  h+='<div class="bs"><div class="bst">▼ WHY REACH OUT NOW</div><div class="bsb">';
  p.trig.forEach(function(tr){h+='<div class="bt"><div class="btn-t">'+tr.n+' <span class="btt t'+tr.t+'">T'+tr.t+'</span>'+(tr.d?'<span class="btd">'+tr.d+'</span>':'')+'</div><div class="bte">'+tr.e+'</div></div>'});
  h+='</div></div>';

  // Angle
  h+='<div class="bs"><div class="bst">▼ YOUR ANGLE</div><div class="bsb">'+p.ang+'</div></div>';

  // Watch outs
  h+='<div class="bs"><div class="bst">▼ WATCH OUTS</div><div class="bsb">';
  p.wo.forEach(function(w,j){h+='<div class="bw"><span class="bwn">'+(j+1)+'</span><span>'+w+'</span></div>'});
  h+='</div></div>';

  // Next step
  h+='<div class="bns"><div class="bnsl">NEXT STEP</div><div class="bnst">'+p.ns+'</div></div>';
  h+='</div>';
  return h;
}

function pick(i){
  sel=i;var p=P[i];var wasFirst=firstBrief;firstBrief=false;

  // If in manager view, switch to rep view first
  if(view==="mgr"){view="rep";render()}

  // DESKTOP: right panel
  if(window.innerWidth>=768){
    var ra=document.getElementById("ra"),rc=document.getElementById("rc"),re=document.getElementById("re");
    ra.innerHTML=actionBarHtml(p);ra.style.display="block";
    rc.innerHTML=briefHtml(p);rc.style.display="block";rc.scrollTop=0;
    re.style.display="none";
    setTimeout(function(){var f=document.getElementById("bsf");if(f)f.style.strokeDashoffset=f.getAttribute("data-off")},100);
  }

  // MOBILE: overlay — ONLY on small screens
  if(window.innerWidth<768){
    var mo=document.getElementById("mo");
    document.getElementById("moc").innerHTML='<div style="position:sticky;top:44px;z-index:5;background:var(--bg);border-bottom:1px solid var(--bd);padding:10px 0">'+actionBarHtml(p)+'</div>'+briefHtml(p);
    mo.style.display="block";
    setTimeout(function(){mo.classList.add("open")},10);
    setTimeout(function(){var f=mo.querySelector("#bsf");if(f)f.style.strokeDashoffset=f.getAttribute("data-off")},200);
  }

  renderLi();
}

function closeMob(){var mo=document.getElementById("mo");mo.classList.remove("open");setTimeout(function(){mo.style.display="none"},300)}

function cpE(i){
  var p=P[i];
  navigator.clipboard.writeText("Subject: "+p.es+"\n\n"+p.eb).then(function(){
    var btns=document.querySelectorAll(".ab.cp");
    btns.forEach(function(b){showToast("\u2713 Email copied to clipboard");if(b.textContent.indexOf("Copy")>=0){b.textContent="\u2713 Copied";b.style.borderColor="var(--gn)";b.style.color="var(--gn)";
      setTimeout(function(){b.textContent="\uD83D\uDCCB Copy";b.style.borderColor="";b.style.color=""},2000)}});
  });
}
function editEmail(i){
  var p=P[i],ed=document.getElementById("emailEdit"),ac=document.getElementById("emailActions"),ec=document.getElementById("emailCard");
  if(!ed)return;ac.style.display="none";ec.style.display="none";ed.style.display="block";
  ed.innerHTML='<div style="font-size:10px;color:var(--txd);margin-bottom:3px">SUBJECT</div><input id="editSubj" style="width:100%;padding:7px 10px;background:var(--s1);border:1px solid var(--bl);border-radius:6px;color:var(--tx);font-family:var(--f);font-size:11px;outline:none;margin-bottom:6px" value="'+p.es.replace(/"/g,"&quot;")+'">'
  +'<div style="font-size:10px;color:var(--txd);margin-bottom:3px">BODY</div><textarea class="b-email-edit" id="editBody">'+p.eb+'</textarea>'
  +'<div class="b-send-row"><button class="b-send-btn" onclick="sendEmail('+i+')">Send Email</button><button class="b-send-cancel" onclick="cancelEdit()">Cancel</button>'
  +(p.ce?'<span style="font-size:10px;color:var(--txd);margin-left:auto">To: '+p.ce+'</span>':'')+'</div>';
}
function cancelEdit(){
  var ed=document.getElementById("emailEdit"),ac=document.getElementById("emailActions"),ec=document.getElementById("emailCard");
  if(ed)ed.style.display="none";if(ac)ac.style.display="flex";if(ec)ec.style.display="block";
}
function sendEmail(i){
  var p=P[i],ed=document.getElementById("emailEdit");
  p.act="sent";p.ad="Just now";
  showToast("✓ Email sent to "+p.cn+" at "+p.c);
  ed.innerHTML='<div class="b-sent-confirm">\u2713 Email sent to '+p.cn+' at '+p.c+'<br><span style="font-size:10px;opacity:.7">Status updated \u2022 Pipeline refreshed</span></div>';
  setTimeout(function(){renderSt();renderLi()},500);
  setTimeout(function(){
    var ac=document.getElementById("emailActions"),ec=document.getElementById("emailCard");
    ed.style.display="none";if(ac)ac.style.display="flex";if(ec)ec.style.display="block";
    var m=document.querySelector(".b-meta");if(m)m.innerHTML='<span class="cbadge '+vc(p.a)+'"><span class="act-line">SENT Just now</span>'+verdTxt(p.a)+'</span>';
  },3000);
}

function sf(f){filter=f;render()}
function setV(v){view=v;sel=-1;document.getElementById("avm").classList.remove("open");
  // Reset right panel to empty state
  if(window.innerWidth>=768){
    document.getElementById("ra").style.display="none";
    document.getElementById("rc").style.display="none";
    document.getElementById("re").style.display="flex";
  }
  render()}
function toggleAv(){document.getElementById("avm").classList.toggle("open")}
document.addEventListener("click",function(e){if(!e.target.closest(".av"))document.getElementById("avm").classList.remove("open")});

function showC(){var el=document.getElementById("ch");el.innerHTML=starters.map(function(s){return'<button class="cc" onmousedown="pickC(this.textContent)">'+s+'</button>'}).join("");el.classList.add("show")}
function hideC(){document.getElementById("ch").classList.remove("show")}
function pickC(t){document.getElementById("ci").value=t;hideC()}
function send(){
  var v=document.getElementById("ci").value.trim();if(!v)return;
  document.getElementById("ci").value="";
  // Check if input matches a known prospect
  var query=v.toLowerCase().replace(/brief me on |find |search /g,"").trim();
  var match=-1;
  P.forEach(function(p,i){if(p.c.toLowerCase().indexOf(query)>=0)match=i});
  if(match>=0){pick(match);return}
  // "Who should I call first" → pick top prospect
  if(query.indexOf("call first")>=0||query.indexOf("should i call")>=0){pick(0);return}
  // Unknown company — show loading animation then message
  var st=document.getElementById("st");
  var origStatus=st.innerHTML;
  var steps=["Scanning 18 sources...","Checking FMCSA records...","Finding contacts via Apollo...","Building brief..."];
  var step=0;
  st.innerHTML='<span style="color:var(--bl)">⟳ Researching '+v+'... '+steps[0]+'</span>';
  var loadInterval=setInterval(function(){
    step++;
    if(step<steps.length){st.innerHTML='<span style="color:var(--bl)">⟳ Researching '+v+'... '+steps[step]+'</span>'}
    else{clearInterval(loadInterval);st.innerHTML='<span style="color:var(--gn)">✓ Brief ready for '+v+' — <em>this is a demo preview, connect to live backend for full results</em></span>';setTimeout(function(){st.innerHTML=origStatus},5000)}
  },1200);
}
document.getElementById("ci").addEventListener("keydown",function(e){if(e.key==="Enter")send()});


function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2500)}
// Keyboard shortcuts
document.addEventListener("keydown",function(e){
  if(document.activeElement.tagName==="INPUT"||document.activeElement.tagName==="TEXTAREA")return;
  if(view!=="rep")return;
  var visible=P.filter(function(p,i){return mf(p)});
  if(e.key==="ArrowDown"){e.preventDefault();var ci=visible.indexOf(P[sel]);ci=Math.min(ci+1,visible.length-1);if(ci>=0)pick(P.indexOf(visible[ci]))}
  if(e.key==="ArrowUp"){e.preventDefault();var ci=visible.indexOf(P[sel]);ci=Math.max(ci-1,0);if(ci>=0)pick(P.indexOf(visible[ci]))}
  if(e.key==="e"||e.key==="E"){if(sel>=0){var p=P[sel];if(p.ce){editEmail(sel)}}}
  if(e.key==="/"||e.key==="k"&&e.metaKey){e.preventDefault();document.getElementById("ci").focus()}
});
function searchContact(i){
  var p=P[i];
  var btn=event.target;
  btn.textContent="Scanning Apollo...";
  btn.style.pointerEvents="none";
  setTimeout(function(){btn.textContent="Checking LinkedIn..."},1200);
  setTimeout(function(){btn.textContent="Verifying email..."},2400);
  setTimeout(function(){
    btn.textContent="\u2709 Contact found";
    btn.style.background="var(--gnd)";btn.style.color="var(--gn)";btn.style.borderColor="rgba(52,211,153,.2)";
    showToast("\u2713 Contact found for "+p.cn+" at "+p.c);
    // In production this would actually update the prospect data
    setTimeout(function(){btn.textContent="\u2709 Email "+p.cn.split(" ")[0];btn.style.pointerEvents="auto"},1500);
  },3600);
}


var isDark=true;
function toggleTheme(){
  isDark=!isDark;
  document.getElementById("shell").classList.toggle("light",!isDark);
}

init();
(function(){
  var h = window.location.hash.replace("#","");
  if(h==="manager" || h==="mgr"){setV("mgr");}
  else if(h==="prospects" || h==="rep"){setV("rep");}
  else if(h==="defend"){setV("rep");setTimeout(function(){var rows=document.querySelectorAll(".row");for(var i=0;i<rows.length;i++){if(rows[i].querySelector(".ri-n") && rows[i].querySelector(".ri-n").textContent.indexOf("Continental")>-1){rows[i].click();break;}}},300);}
  else if(h==="pipeline"){setV("rep");setTimeout(function(){var fc=document.querySelectorAll(".fc");for(var i=0;i<fc.length;i++){if(fc[i].textContent.indexOf("Follow")>-1){fc[i].click();break;}}},300);}
})();
</script>
